name: Check Pull Request

on:
  pull_request:

jobs:
  pr-validator:
    name: Run Pull Request Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate PR title with commitlint
        if: github.event_name == 'pull_request'
        run: echo "${{ github.event.pull_request.title }}" | npx commitlint --verbose

      - name: Validate PR commits with commitlint
        if: github.event_name == 'pull_request'
        run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose

      - name: Test code and Create Test Coverage Reports
        run: |
          npm run build:frontend
          npm run format:check
          npm run lint
          npm test

      - name: Test Docker Image Build
        run: |
          set +e
          docker build --no-cache --tag cdp-node-frontend-template .
          exit $?

      - name: SonarCloud Scan
        if: github.actor != 'dependabot[bot]'
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  pact:
    if: github.event.repository.fork == false
    needs: pr-validator
    runs-on: self-hosted

    steps:
      - name: Mask secrets
        run: |
          echo "::add-mask::$PACT_USER"
          echo "::add-mask::$PACT_PASS"

      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Fetch latest tags
        run: git fetch --tags --force

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run contract tests
        env:
          PACT_BROKER_BASE_URL: https://ffc-pact-broker.azure.defra.cloud
          PACT_PUBLISH_VERIFICATION: true
        run: |
          SERVICE_VERSION=$(git describe --tags --abbrev=0) npm run test:contracts

      - name: Publish consumer pacts
        env:
          PACT_BROKER_BASE_URL: https://ffc-pact-broker.azure.defra.cloud
        shell: bash
        run: |
          # Use bash to upload pacts manually since Azure Application Gateway blocks /contracts/publish

          ls -lh src/contracts/consumer/pacts/*.json

          # Loop through all pact files
          for pact_file in src/contracts/consumer/pacts/*.json; do
            if [[ -f "$pact_file" ]]; then
              echo "Processing pact file: $pact_file"

              # Extract consumer and provider names using jq
              consumer=$(jq -r '.consumer.name' "$pact_file")
              provider=$(jq -r '.provider.name' "$pact_file")
              version=$(git describe --tags --abbrev=0)

              # Construct the URI
              uri="${PACT_BROKER_BASE_URL}/pacts/provider/${provider}/consumer/${consumer}/version/${version}"

              echo "Publishing pact: $consumer -> $provider (version: $version)"

              # Upload the pact using curl
              if curl --fail --silent --show-error --request PUT \
                  --header "Content-Type: application/json" \
                  --user "${PACT_USER}:${PACT_PASS}" \
                  --data "@${pact_file}" \
                  "$uri"; then
                echo "✓ Successfully published pact for $consumer -> $provider"
              else
                echo "❌ Failed to publish pact for $consumer -> $provider"
                exit 1
              fi
            fi
          done
